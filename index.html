<!DOCTYPE html>
<html>
<head>
<title>Tips Thiessen Clicker</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#1b1f2a;
color:white;
margin:0;
}

#layout{
display:grid;
grid-template-columns:250px 1fr 250px;
gap:10px;
padding:10px;
}

.panel{
background:#2a3040;
padding:15px;
border-radius:10px;
}

#center{
text-align:center;
}

#face{
width:240px;
border-radius:20px;
cursor:pointer;
transition:transform .1s;
}

#face:active{
transform:scale(.9);
}

button{
width:220px;
padding:8px;
margin:5px;
border:none;
border-radius:6px;
background:#f1c40f;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#f39c12;
}

.stat{
font-size:18px;
margin:5px;
}

</style>
</head>

<body>

<div id="layout">

<!-- LEFT -->
<div class="panel">

<h2>Player</h2>

<div class="stat">Level: <span id="level">1</span></div>
<div class="stat">XP: <span id="xp">0</span>/<span id="xpNeeded">100</span></div>

</div>


<!-- CENTER -->
<div id="center" class="panel">

<h1>Tips Thiessen Clicker</h1>

<div class="stat">Money: $<span id="money">1000</span></div>
<div class="stat">Click Power: +<span id="clickPower">1</span></div>

<br>

<img src="tips-thiessen.png" id="face">

<p>Click Tips to earn money</p>

<h3>Click Upgrades</h3>
<div id="clickUpgrades"></div>

<h3>Properties</h3>
<div id="propertyUpgrades"></div>

</div>


<!-- RIGHT -->
<div class="panel">

<h2>Leaderboard</h2>

<input id="playerName" placeholder="Your name">
<button onclick="saveScore()">Submit Score</button>

<div id="leaderboard">Loading...</div>

</div>

</div>


<script>

/* SUPABASE SAFE SETUP */

let supabase = null

try {
  supabase = window.supabase.createClient(
    "https://tguvcureqxvcyfwunlou.supabase.co",
    "sb_publishable_vhgkMwf0tH8-RoDosECNEw_ormNSYpU"
  )
} catch(e){
  console.log("Supabase failed, game still works")
}

/* GAME */

let money = 1000
let clickPower = 1

let level = 1
let xp = 0
let xpNeeded = 100

const face = document.getElementById("face")

const clickUpgradeNames = [
"Intern Training","Cold Call Scripts","Sales Workshop","Lead Generator",
"Open House Strategy","Neighborhood Expert","Negotiation Skills",
"Online Advertising","Referral Network","Marketing Assistant",
"Luxury Listings","Real Estate Podcast","Billboard Ads",
"Regional Manager","National Marketing","Celebrity Listings",
"Property Mogul","Real Estate Empire","Global Investments","Tycoon Status"
]

const propertyNames = [
"Lemonade Office","Trailer Office","Starter Home","Townhouse","Small Apartment",
"Duplex","Local Office","Apartment Building","Mini Mall","City Office",
"Downtown Complex","Hotel","Luxury Apartments","Corporate Tower",
"Financial Center","Mega Skyscraper","Private Island Resort",
"International HQ","Global Empire","World Property Network"
]

let clickUpgrades=[]
let properties=[]

for(let i=0;i<20;i++){

clickUpgrades.push({
name:clickUpgradeNames[i],
power:1+i*3,
cost:1000+i*2000,
bought:false
})

properties.push({
name:propertyNames[i],
income:5+i*10,
cost:500+i*4000,
owned:0
})

}

function createButtons(){

const clickDiv=document.getElementById("clickUpgrades")
const propDiv=document.getElementById("propertyUpgrades")

clickUpgrades.forEach((u,i)=>{

let b=document.createElement("button")
b.innerText=u.name+"  +"+u.power+" ($"+u.cost+")"
b.onclick=()=>buyClickUpgrade(i)
clickDiv.appendChild(b)

})

properties.forEach((p,i)=>{

let b=document.createElement("button")
b.innerText=p.name+" ($"+p.cost+")"
b.onclick=()=>buyProperty(i)
propDiv.appendChild(b)

})

}

/* CLICK */

face.onclick=function(){

money+=clickPower
addXP(1)
update()

}

/* BUY */

function buyClickUpgrade(i){

let u=clickUpgrades[i]

if(!u.bought && money>=u.cost){

money-=u.cost
clickPower+=u.power
u.bought=true

addXP(20)
update()

}

}

function buyProperty(i){

let p=properties[i]

if(money>=p.cost){

money-=p.cost
p.owned++
addXP(10)
update()

}

}

/* PASSIVE */

setInterval(function(){

properties.forEach(p=>{
money+=p.income*p.owned
})

update()

},1000)

/* LEVEL */

function addXP(amount){

xp+=amount

if(xp>=xpNeeded){
xp-=xpNeeded
level++
xpNeeded=Math.floor(xpNeeded*1.25)
}

}

/* UPDATE */

function update(){

document.getElementById("money").innerText=Math.floor(money)
document.getElementById("clickPower").innerText=clickPower

document.getElementById("level").innerText=level
document.getElementById("xp").innerText=xp
document.getElementById("xpNeeded").innerText=xpNeeded

}

/* 🌎 ONLINE LEADERBOARD */

async function saveScore(){

if(!supabase){
alert("Leaderboard offline")
return
}

let name = document.getElementById("playerName").value

if(!name){
alert("Enter your name")
return
}

try{

await supabase
.from("leaderboard")
.insert([{ name:name, score:money }])

loadLeaderboard()

}catch(e){
console.log("Error saving score", e)
}

}

async function loadLeaderboard(){

if(!supabase){
document.getElementById("leaderboard").innerText="Offline"
return
}

try{

let {data,error} = await supabase
.from("leaderboard")
.select("*")
.order("score",{ascending:false})
.limit(10)

if(error){
console.log(error)
return
}

let text=""

data.forEach((s,i)=>{
text += `${i+1}. ${s.name} - $${s.score}<br>`
})

document.getElementById("leaderboard").innerHTML=text

}catch(e){
document.getElementById("leaderboard").innerText="Error loading"
}

}

/* START */

createButtons()
loadLeaderboard()
update()

</script>

</body>
</html>
