<!DOCTYPE html>
<html>
<head>
<title>Tips Thiessen Clicker</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
background:#12151c;
color:white;
margin:0;
}

#layout{
display:grid;
grid-template-columns:250px 1fr 250px;
gap:10px;
padding:10px;
}

.panel{
background:#1f2430;
padding:15px;
border-radius:10px;
}

#center{text-align:center;}

#face{
width:220px;
border-radius:20px;
cursor:pointer;
transition:transform .1s;
}

#face:active{transform:scale(.9);}

button{
width:220px;
margin:4px;
padding:8px;
border:none;
border-radius:6px;
background:#f1c40f;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div id="layout">

<!-- LEFT -->
<div class="panel">
<h2>Player</h2>
Level: <span id="level">1</span><br>
XP: <span id="xp">0</span>/<span id="xpNeeded">100</span>
</div>

<!-- CENTER -->
<div class="panel" id="center">

<h1>Tips Thiessen Clicker</h1>

Money: $<span id="money">1000</span><br>
Click Power: +<span id="clickPower">1</span>

<br><br>

<img src="tips-thiessen.png" id="face">

<h3>Upgrades</h3>
<div id="upgrades"></div>

<h3>Properties</h3>
<div id="properties"></div>

</div>

<!-- RIGHT -->
<div class="panel">
<h2>Leaderboard</h2>

<input id="playerName" placeholder="Name">
<button onclick="submitScore()">Submit</button>

<div id="leaderboard">Loading...</div>
</div>

</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>

/* SAFE SUPABASE (WON'T CRASH GAME) */

let supabase = null

try {
supabase = window.supabase.createClient(
"https://tguvcureqxvcyfwunlou.supabase.co",
"sb_publishable_vhgkMwf0tH8-RoDosECNEw_ormNSYpU"
)
} catch(e){
console.log("Supabase failed (game still works)")
}

/* GAME DATA */

let money = 1000
let clickPower = 1

let level = 1
let xp = 0
let xpNeeded = 100

const upgradeNames = [
"Intern","Calls","Training","Ads","Leads",
"Broker","Luxury","Office","TV","Celebrity",
"Brand","Campaign","Jet Deals","Global",
"Fund","Empire","Skyline","World Mogul",
"King","Ultimate Tycoon"
]

const propertyNames = [
"Desk","Office","House","Duplex","Apartments",
"Building","Mall","Hotel","Tower","Skyscraper",
"Luxury Tower","Resort","Island","Mega City",
"Global HQ","Chain","Empire","Planet",
"Galaxy","Multiverse"
]

let upgrades=[]
let properties=[]

for(let i=0;i<20;i++){

upgrades.push({
name:upgradeNames[i],
count:0,
power:1+i*2,
baseCost:1000+i*1500
})

properties.push({
name:propertyNames[i],
count:0,
income:5+i*15,
baseCost:2000+i*3000
})

}

/* BETTER SCALING */

function getCost(base,count){

let cost = base * Math.pow(1.35,count)

if(count > 5){
cost *= Math.pow(2.5,count-5)
}

return Math.floor(cost)
}

/* DRAW UI */

function draw(){

document.getElementById("money").innerText=Math.floor(money)
document.getElementById("clickPower").innerText=clickPower
document.getElementById("level").innerText=level
document.getElementById("xp").innerText=xp
document.getElementById("xpNeeded").innerText=xpNeeded

let uHTML=""

upgrades.forEach((u,i)=>{

let cost = getCost(u.baseCost,u.count)

uHTML += `<button onclick="buyUpgrade(${i})">
${u.name} Lv.${u.count} (+${u.power}) - $${cost}
</button>`

})

document.getElementById("upgrades").innerHTML = uHTML

let pHTML=""

properties.forEach((p,i)=>{

let cost = getCost(p.baseCost,p.count)

pHTML += `<button onclick="buyProperty(${i})">
${p.name} (${p.count}) - $${cost}
</button>`

})

document.getElementById("properties").innerHTML = pHTML

}

/* BUY */

function buyUpgrade(i){

let u = upgrades[i]
let cost = getCost(u.baseCost,u.count)

if(money >= cost){

money -= cost
u.count++
clickPower += u.power

addXP(10)
draw()

}

}

function buyProperty(i){

let p = properties[i]
let cost = getCost(p.baseCost,p.count)

if(money >= cost){

money -= cost
p.count++

addXP(5)
draw()

}

}

/* CLICK */

document.getElementById("face").onclick = () => {

money += clickPower

let sound = document.getElementById("clickSound")
if(sound){
sound.currentTime = 0
sound.play().catch(()=>{})
}

addXP(1)
draw()

}

/* PASSIVE INCOME */

setInterval(()=>{

properties.forEach(p=>{
money += p.income * p.count
})

draw()

},1000)

/* LEVEL */

function addXP(a){

xp += a

if(xp >= xpNeeded){
xp = 0
level++
xpNeeded = Math.floor(xpNeeded * 1.3)
}

}

/* LEADERBOARD (SAFE) */

async function submitScore(){

if(!supabase){
alert("Leaderboard offline")
return
}

let name = document.getElementById("playerName").value

if(!name){
alert("Enter name")
return
}

try{
await supabase.from("leaderboard")
.insert([{name:name,score:Math.floor(money)}])

loadLeaderboard()

}catch(e){
console.log("Submit failed", e)
}

}

async function loadLeaderboard(){

if(!supabase){
document.getElementById("leaderboard").innerText="Offline"
return
}

try{

let {data} = await supabase
.from("leaderboard")
.select("*")
.order("score",{ascending:false})
.limit(10)

let text=""

data.forEach((p,i)=>{
text += `${i+1}. ${p.name} - $${p.score}<br>`
})

document.getElementById("leaderboard").innerHTML = text

}catch(e){
document.getElementById("leaderboard").innerText="Error loading"
}

}

/* START */

draw()
loadLeaderboard()

</script>

</body>
</html>
