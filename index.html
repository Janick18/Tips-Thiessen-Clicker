<!DOCTYPE html>
<html>
<head>
<title>Tips Thiessen Clicker</title>

<style>
body{
font-family:Arial;
background:#1b1f2a;
color:white;
margin:0;
overflow:hidden;
}

#layout{
display:grid;
grid-template-columns:250px 1fr 250px;
gap:10px;
padding:10px;
height:100vh;
box-sizing:border-box;
}

.panel{
background:#2a3040;
padding:15px;
border-radius:10px;
overflow:hidden;
}

#center{
text-align:center;
overflow-y:auto;
}

#face{
width:240px;
border-radius:20px;
cursor:pointer;
transition:transform .1s;
}

#face:active{
transform:scale(.9);
}

button{
width:220px;
padding:10px;
margin:6px;
border:none;
border-radius:8px;
background:linear-gradient(145deg,#f1c40f,#f39c12);
font-weight:bold;
cursor:pointer;
}

.stat{
font-size:18px;
margin:6px;
background:#1e2433;
padding:6px;
border-radius:6px;
}

#clickUpgrades, #propertyUpgrades{
max-height:250px;
overflow-y:auto;
}

/* 💥 Floating money animation */
.floating{
position:absolute;
color:#00ff99;
font-weight:bold;
pointer-events:none;
animation:floatUp 1s ease-out forwards;
}

@keyframes floatUp{
0%{opacity:1; transform:translateY(0);}
100%{opacity:0; transform:translateY(-60px);}
}
</style>
</head>

<body>

<div id="layout">

<div class="panel">
<h2>Player</h2>
<div class="stat">Level: <span id="level">1</span></div>
<div class="stat">XP: <span id="xp">0</span>/<span id="xpNeeded">100</span></div>

<button onclick="saveGame()">Save</button>
<button onclick="loadGame()">Load</button>
</div>

<div id="center" class="panel">

<h1>Tips Thiessen Clicker</h1>

<div class="stat">Money: $<span id="money">1000</span></div>
<div class="stat">Click Power: +<span id="clickPower">1</span></div>

<br>

<img src="tips-thiessen.png" id="face">

<p>Click to earn money</p>

<h3>Click Upgrades</h3>
<div id="clickUpgrades"></div>

<h3>Properties</h3>
<div id="propertyUpgrades"></div>

</div>

<div class="panel">
<h2>Info</h2>
<p>Idle Tycoon Game</p>
</div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

let money = 1000
let clickPower = 1

let level = 1
let xp = 0
let xpNeeded = 100

const face = document.getElementById("face")

/* 40 upgrades now */
let upgrades=[]
let properties=[]

for(let i=0;i<40;i++){

upgrades.push({
name:"Upgrade "+(i+1),
power:1+i*5,
baseCost:1000+i*3000,
level:0,
element:null
})

properties.push({
name:"Property "+(i+1),
income:5+i*15,
baseCost:500+i*5000,
owned:0,
element:null
})

}

/* COST */

function upgradeCost(u){
let m = u.level < 4 ? 1.15 : 1.4
return Math.floor(u.baseCost * Math.pow(m,u.level))
}

function propertyCost(p){
let m = p.owned < 4 ? 1.12 : 1.35
return Math.floor(p.baseCost * Math.pow(m,p.owned))
}

/* 🔥 ONLY HIGHEST UPGRADE COUNTS */

function recalcClick(){
let max = 1
upgrades.forEach(u=>{
if(u.level > 0){
max = Math.max(max, u.power)
}
})
clickPower = max
}

/* BUTTONS */

function createButtons(){

const cDiv = document.getElementById("clickUpgrades")
const pDiv = document.getElementById("propertyUpgrades")

upgrades.forEach((u,i)=>{
let b = document.createElement("button")
b.onclick = ()=>buyUpgrade(i)
u.element = b
cDiv.appendChild(b)
})

properties.forEach((p,i)=>{
let b = document.createElement("button")
b.onclick = ()=>buyProperty(i)
p.element = b
pDiv.appendChild(b)
})

}

/* BUY */

function buyUpgrade(i){
let u = upgrades[i]
let cost = upgradeCost(u)

if(money >= cost){
money -= cost
u.level++
recalcClick()
addXP(20)
update()
}
}

function buyProperty(i){
let p = properties[i]
let cost = propertyCost(p)

if(money >= cost){
money -= cost
p.owned++
addXP(10)
update()
}
}

/* 💥 CLICK + ANIMATION */

if(face){
face.onclick = function(e){

money += clickPower
addXP(1)
update()

let float = document.createElement("div")
float.className = "floating"
float.innerText = "+" + clickPower

float.style.left = (e.pageX) + "px"
float.style.top = (e.pageY) + "px"

document.body.appendChild(float)

setTimeout(()=>float.remove(),1000)
}
}

/* PASSIVE */

setInterval(()=>{
properties.forEach(p=>{
money += p.income * p.owned
})
update()
},1000)

/* LEVEL */

function addXP(a){
xp += a
if(xp >= xpNeeded){
xp -= xpNeeded
level++
xpNeeded = Math.floor(xpNeeded * 1.25)
}
}

/* SAVE */

function saveGame(){
let data={
money,level,xp,xpNeeded,
upgrades:upgrades.map(u=>u.level),
properties:properties.map(p=>p.owned)
}
localStorage.setItem("save",JSON.stringify(data))
}

/* LOAD */

function loadGame(){
let data = JSON.parse(localStorage.getItem("save"))
if(!data) return

money=data.money
level=data.level
xp=data.xp
xpNeeded=data.xpNeeded

data.upgrades.forEach((lvl,i)=>{
upgrades[i].level=lvl
})

data.properties.forEach((own,i)=>{
properties[i].owned=own
})

recalcClick()
update()
}

/* UPDATE */

function update(){

document.getElementById("money").innerText=Math.floor(money)
document.getElementById("clickPower").innerText=clickPower
document.getElementById("level").innerText=level
document.getElementById("xp").innerText=xp
document.getElementById("xpNeeded").innerText=xpNeeded

upgrades.forEach(u=>{
if(u.element){
u.element.innerText =
`${u.name} Lv.${u.level} (+${u.power}) - $${upgradeCost(u)}`
}
})

properties.forEach(p=>{
if(p.element){
p.element.innerText =
`${p.name} x${p.owned} (+$${p.income}/s) - $${propertyCost(p)}`
}
})

}

/* START */

createButtons()
loadGame()
update()
setInterval(saveGame,5000)

})

</script>

</body>
</html>
