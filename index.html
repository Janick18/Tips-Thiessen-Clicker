<!DOCTYPE html>
<html>
<head>
<title>Tips Thiessen Clicker</title>

<style>
body{
font-family:Arial;
background:#1b1f2a;
color:white;
margin:0;
overflow:hidden;
}

#layout{
display:grid;
grid-template-columns:250px 1fr 250px;
gap:10px;
padding:10px;
height:100vh;
}

.panel{
background:#2a3040;
padding:15px;
border-radius:10px;
}

#center{
text-align:center;
overflow-y:auto;
position:relative;
}

#face{
width:240px;
border-radius:20px;
cursor:pointer;
}

button{
width:220px;
padding:10px;
margin:6px;
border:none;
border-radius:8px;
background:linear-gradient(145deg,#f1c40f,#f39c12);
cursor:pointer;
}

button:disabled{
background:#555;
cursor:not-allowed;
}

.stat{
font-size:18px;
margin:6px;
background:#1e2433;
padding:6px;
border-radius:6px;
}

#clickUpgrades, #propertyUpgrades{
max-height:250px;
overflow-y:auto;
}

.faceParticle{
position:absolute;
width:40px;
height:40px;
border-radius:50%;
pointer-events:none;
animation:fall 1s linear forwards;
}

@keyframes fall{
0%{opacity:1;}
100%{opacity:0; transform:translateY(150px);}
}
</style>
</head>

<body>

<div id="layout">

<div class="panel">
<h2>Player</h2>
<div class="stat">Level: <span id="level">1</span></div>
<div class="stat">XP: <span id="xp">0</span>/<span id="xpNeeded">100</span></div>
</div>

<div id="center" class="panel">

<h1>Tips Thiessen Clicker</h1>

<div class="stat">Money: $<span id="money">0</span></div>
<div class="stat">Click Power: +<span id="clickPower">1</span></div>
<div class="stat">Money/sec: $<span id="mps">0</span></div>

<br>

<img src="tips-thiessen.png" id="face">

<h3>Click Upgrades</h3>
<div id="clickUpgrades"></div>

<h3>Properties</h3>
<div id="propertyUpgrades"></div>

</div>

<div class="panel">
<h2>Progress</h2>
<p>~8 hour grind ⏳</p>
</div>

</div>

<!-- Sounds -->
<audio id="clickSound" src="click.mp3"></audio>
<audio id="bgMusic" src="background music.mp3" loop></audio>

<script>

document.addEventListener("DOMContentLoaded", function(){

let money = 0
let clickPower = 1
let mps = 0

let level = 1
let xp = 0
let xpNeeded = 100

const face = document.getElementById("face")
const center = document.getElementById("center")
const clickSound = document.getElementById("clickSound")
const bgMusic = document.getElementById("bgMusic")

/* Start music (may require click) */
bgMusic.volume = 0.4
bgMusic.play().catch(()=>{})

let upgrades=[]
let properties=[]

function format(n){
if(n>=1e12) return (n/1e12).toFixed(1)+"T"
if(n>=1e9) return (n/1e9).toFixed(1)+"B"
if(n>=1e6) return (n/1e6).toFixed(1)+"M"
if(n>=1e3) return (n/1e3).toFixed(1)+"K"
return Math.floor(n)
}

/* UPGRADES */
for(let i=0;i<40;i++){
upgrades.push({
name:"Click Upgrade "+(i+1),
baseCost: 200 * Math.pow(3.5,i),
level:0,
element:null
})
}

/* PROPERTIES */
for(let i=0;i<40;i++){
properties.push({
name:"Property "+(i+1),
income: 20 * Math.pow(2.2,i),
cost: 1000 * Math.pow(3.8,i),
owned:false,
element:null
})
}

function upgradeCost(u){
return Math.floor(u.baseCost * Math.pow(2.6,u.level))
}

function upgradePower(u){
return Math.floor((u.baseCost/150) * Math.pow(2.4,u.level))
}

function createButtons(){

const cDiv=document.getElementById("clickUpgrades")
const pDiv=document.getElementById("propertyUpgrades")

upgrades.forEach((u,i)=>{
let b=document.createElement("button")
b.onclick=()=>buyUpgrade(i)
u.element=b
cDiv.appendChild(b)
})

properties.forEach((p,i)=>{
let b=document.createElement("button")
b.onclick=()=>buyProperty(i)
p.element=b
pDiv.appendChild(b)
})

}

function buyUpgrade(i){

let u=upgrades[i]
let cost=upgradeCost(u)

if(i>0 && upgrades[i-1].level===0) return

if(money>=cost){
money-=cost
u.level++
clickPower+=upgradePower(u)
addXP(20)
update()
}
}

function buyProperty(i){

let p=properties[i]

if(i>0 && !properties[i-1].owned) return

if(!p.owned && money>=p.cost){
money-=p.cost
p.owned=true
mps+=p.income
addXP(25)
update()
}
}

/* CLICK */
face.onclick=function(e){

/* ensures music starts after user interaction */
bgMusic.play().catch(()=>{})

clickSound.currentTime=0
clickSound.play()

money+=clickPower
addXP(1)

const rect=center.getBoundingClientRect()

for(let i=0;i<3;i++){

let img=document.createElement("img")
img.src="tips-thiessen.png"
img.className="faceParticle"

img.style.left=(e.clientX - rect.left - 20)+"px"
img.style.top=(e.clientY - rect.top - 20)+"px"

center.appendChild(img)
setTimeout(()=>img.remove(),1000)
}

update()
}

/* PASSIVE */
setInterval(()=>{
money+=mps
update()
},1000)

/* LEVEL */
function addXP(a){
xp+=a
if(xp>=xpNeeded){
xp-=xpNeeded
level++
xpNeeded=Math.floor(xpNeeded*1.35)
}
}

/* UPDATE */
function update(){

document.getElementById("money").innerText=format(money)
document.getElementById("clickPower").innerText=format(clickPower)
document.getElementById("mps").innerText=format(mps)

document.getElementById("level").innerText=level
document.getElementById("xp").innerText=xp
document.getElementById("xpNeeded").innerText=xpNeeded

upgrades.forEach((u,i)=>{
if(u.element){
let locked=(i>0 && upgrades[i-1].level===0)
u.element.disabled=locked

u.element.innerText=
`${locked?"🔒 ":""}${u.name} Lv.${u.level} (+${format(upgradePower(u))}) - $${format(upgradeCost(u))}`
}
})

properties.forEach((p,i)=>{
if(p.element){
let locked=(i>0 && !properties[i-1].owned)
p.element.disabled=locked

p.element.innerText=
`${locked?"🔒 ":""}${p.name} (+${format(p.income)}/s) - $${format(p.cost)}`
}
})

}

createButtons()
update()

})

</script>

</body>
</html>
