<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center;">

<h1>TEST GAME</h1>

<p id="money">1000</p>

<button onclick="clickMoney()">CLICK</button>

<script>

let money = 1000

function clickMoney(){
money++
document.getElementById("money").innerText = money
}

</script>

</body>
</html>
