<!DOCTYPE html>
<html>
<head>
<title>Tips Thiessen Clicker</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#12151c;
color:white;
margin:0;
}

#layout{
display:grid;
grid-template-columns:250px 1fr 250px;
gap:10px;
padding:10px;
}

.panel{
background:#1f2430;
padding:15px;
border-radius:10px;
}

#center{text-align:center;}

#face{
width:230px;
border-radius:20px;
cursor:pointer;
transition:transform .1s;
}

#face:active{
transform:scale(.9);
}

button{
width:220px;
margin:4px;
padding:8px;
border:none;
border-radius:6px;
background:#f1c40f;
font-weight:bold;
cursor:pointer;
}

.stat{margin:6px;}

</style>
</head>

<body>

<div id="layout">

<!-- LEFT -->
<div class="panel">
<h2>Player</h2>
<div class="stat">Level: <span id="level">1</span></div>
<div class="stat">XP: <span id="xp">0</span>/<span id="xpNeeded">100</span></div>
</div>

<!-- CENTER -->
<div class="panel" id="center">

<h1>Tips Thiessen Clicker</h1>

<div class="stat">Money: $<span id="money">1000</span></div>
<div class="stat">Click Power: +<span id="clickPower">1</span></div>

<br>

<img src="tips-thiessen.png" id="face">

<h3>Upgrades</h3>
<div id="upgrades"></div>

<h3>Properties</h3>
<div id="properties"></div>

</div>

<!-- RIGHT -->
<div class="panel">

<h2>Leaderboard</h2>

<input id="playerName" placeholder="Your name">
<button onclick="submitScore()">Submit</button>

<div id="leaderboard"></div>

</div>

</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>

/* SUPABASE */

const supabase = window.supabase.createClient(
"https://tguvcureqxvcyfwunlou.supabase.co",
"sb_publishable_vhgkMwf0tH8-RoDosECNEw_ormNSYpU"
)

/* GAME */

let money=1000
let clickPower=1

let level=1
let xp=0
let xpNeeded=100

const upgradeNames=[
"Intern","Cold Calls","Sales Training","Marketing Ads","Lead Funnel",
"Broker License","Luxury Clients","Regional Office","TV Ads","Celebrity Deals",
"National Brand","Mega Campaign","Private Jet Deals","Global Clients",
"Investment Fund","Property Empire","Skyline Builder","World Mogul",
"Real Estate King","Ultimate Tycoon"
]

const propertyNames=[
"Desk","Small Office","House","Duplex","Apartments",
"Office Building","Mall","Hotel","Tower","Skyscraper",
"Luxury Tower","Resort","Island","Mega City","Global HQ",
"International Chain","World Empire","Planet Holdings",
"Interstellar Realty","Multiverse Empire"
]

let upgrades=[]
let properties=[]

for(let i=0;i<20;i++){

upgrades.push({
name:upgradeNames[i],
basePower:1+i*2,
count:0,
baseCost:1000+i*1500
})

properties.push({
name:propertyNames[i],
income:5+i*15,
count:0,
baseCost:2000+i*3000
})

}

/* PRICE SCALING (VERY HARD AFTER 5) */

function getCost(base,count){

let cost = base * Math.pow(1.4,count)

if(count>5){
cost *= Math.pow(2.2,count-5)
}

return Math.floor(cost)
}

/* UI */

function draw(){

document.getElementById("money").innerText=Math.floor(money)
document.getElementById("clickPower").innerText=clickPower
document.getElementById("level").innerText=level
document.getElementById("xp").innerText=xp
document.getElementById("xpNeeded").innerText=xpNeeded

let uHTML=""
upgrades.forEach((u,i)=>{

let cost=getCost(u.baseCost,u.count)

uHTML+=`<button onclick="buyUpgrade(${i})">
${u.name} Lv.${u.count} (+${u.basePower}) - $${cost}
</button>`
})

document.getElementById("upgrades").innerHTML=uHTML

let pHTML=""
properties.forEach((p,i)=>{

let cost=getCost(p.baseCost,p.count)

pHTML+=`<button onclick="buyProperty(${i})">
${p.name} (${p.count}) - $${cost}
</button>`
})

document.getElementById("properties").innerHTML=pHTML

}

/* BUY */

function buyUpgrade(i){

let u=upgrades[i]
let cost=getCost(u.baseCost,u.count)

if(money>=cost){

money-=cost
u.count++
clickPower+=u.basePower

addXP(10)
draw()

}

}

function buyProperty(i){

let p=properties[i]
let cost=getCost(p.baseCost,p.count)

if(money>=cost){

money-=cost
p.count++

addXP(5)
draw()

}

}

/* CLICK */

document.getElementById("face").onclick=()=>{

money+=clickPower

let sound=document.getElementById("clickSound")
sound.currentTime=0
sound.play()

addXP(1)
draw()

}

/* PASSIVE */

setInterval(()=>{

properties.forEach(p=>{
money+=p.income*p.count
})

draw()

},1000)

/* LEVEL */

function addXP(a){

xp+=a

if(xp>=xpNeeded){
xp=0
level++
xpNeeded=Math.floor(xpNeeded*1.3)
}

}

/* LEADERBOARD */

async function submitScore(){

let name=document.getElementById("playerName").value

await supabase.from("leaderboard")
.insert([{name:name,score:Math.floor(money)}])

loadLeaderboard()

}

async function loadLeaderboard(){

let {data}=await supabase
.from("leaderboard")
.select("*")
.order("score",{ascending:false})
.limit(10)

let text=""

data.forEach((p,i)=>{
text+=`${i+1}. ${p.name} - $${p.score}<br>`
})

document.getElementById("leaderboard").innerHTML=text

}

loadLeaderboard()
draw()

</script>

</body>
</html>
